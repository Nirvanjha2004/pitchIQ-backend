# ── HTTP — ACME challenge + redirect ──────────────────────────────────────────
server {
    listen 80;
    server_name api.nirvan.dev;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

